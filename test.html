<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>拼形蛇 - 像素掌机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* ===== 掌机外壳 ===== */
        .pocket-shell {
            width: 100%;
            max-width: 420px;
            background: #2a2332;
            border-radius: 24px 24px 32px 32px;
            padding: 24px 20px 32px;
            box-shadow:
                    0 20px 60px rgba(0,0,0,0.8),
                    inset 0 2px 0 rgba(255,255,255,0.08),
                    inset 0 -4px 0 rgba(0,0,0,0.4);
            position: relative;
            border: 4px solid #1a1520;
        }

        /* 顶部装饰条 - 像素风 */
        .shell-top {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .pixel-dot {
            width: 8px;
            height: 8px;
            background: #ff5a7a;
            box-shadow:
                    0 2px 0 #cc4460,
                    0 4px 0 rgba(0,0,0,0.3);
        }

        /* 品牌文字 */
        .shell-brand {
            text-align: center;
            color: #ff5a7a;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 16px;
            text-shadow: 0 2px 0 rgba(0,0,0,0.5);
            opacity: 0.9;
        }

        /* 屏幕外框 - 内凹感 */
        .screen-bezel {
            background: #1e1b24;
            border-radius: 16px;
            padding: 16px;
            box-shadow:
                    inset 0 4px 12px rgba(0,0,0,0.6),
                    0 1px 0 rgba(255,255,255,0.05);
            border: 2px solid #15131a;
            position: relative;
        }

        /* 屏幕玻璃反光 */
        .screen-bezel::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
            border-radius: 16px 16px 0 0;
            pointer-events: none;
            z-index: 10;
        }

        /* 屏幕内标题 */
        .screen-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ff5a7a;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 8px;
            padding: 0 4px;
        }
        .battery-led {
            width: 6px;
            height: 6px;
            background: #00ffaa;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ffaa;
            animation: blink 3s infinite;
        }
        @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0.3} }

        /* 实际游戏画面容器 - 你的游戏 Canvas 就放在这里 */
        #gameScreen {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #0d0d0d;
            border-radius: 8px;
            display: block;
            image-rendering: pixelated;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* ===== 控制区 ===== */
        .controls-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 28px;
            padding: 0 8px;
        }

        /* 方向键 - 像素十字 */
        .dpad {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .dpad-center {
            position: absolute;
            top: 40px; left: 40px;
            width: 40px; height: 40px;
            background: #1e1b24;
            border-radius: 4px;
            box-shadow:
                    inset 0 2px 4px rgba(0,0,0,0.5),
                    0 2px 0 rgba(255,255,255,0.05);
        }
        .dpad-up, .dpad-down, .dpad-left, .dpad-right {
            position: absolute;
            background: #3a3544;
            border-radius: 4px;
            box-shadow:
                    0 4px 0 #221f29,
                    0 6px 8px rgba(0,0,0,0.4),
                    inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .dpad-up:active, .dpad-down:active, .dpad-left:active, .dpad-right:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #221f29, inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .dpad-up { top: 0; left: 40px; width: 40px; height: 40px; }
        .dpad-down { bottom: 0; left: 40px; width: 40px; height: 40px; }
        .dpad-left { top: 40px; left: 0; width: 40px; height: 40px; }
        .dpad-right { top: 40px; right: 0; width: 40px; height: 40px; }

        /* 方向键箭头 */
        .dpad-up::after, .dpad-down::after, .dpad-left::after, .dpad-right::after {
            content: '';
            position: absolute;
            width: 0; height: 0;
            border: solid transparent;
            border-width: 6px;
        }
        .dpad-up::after {
            bottom: 10px; left: 14px;
            border-bottom-color: rgba(255,255,255,0.3);
        }
        .dpad-down::after {
            top: 10px; left: 14px;
            border-top-color: rgba(255,255,255,0.3);
        }
        .dpad-left::after {
            right: 10px; top: 14px;
            border-right-color: rgba(255,255,255,0.3);
        }
        .dpad-right::after {
            left: 10px; top: 14px;
            border-left-color: rgba(255,255,255,0.3);
        }

        /* AB 按钮 */
        .action-buttons {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            transform: rotate(-15deg);
            margin-bottom: 8px;
        }
        .btn-ab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .btn-ab .circle {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #ff5a7a;
            box-shadow:
                    0 4px 0 #cc4460,
                    0 6px 12px rgba(0,0,0,0.4),
                    inset 0 -4px 8px rgba(0,0,0,0.2),
                    inset 0 2px 4px rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.05s;
        }
        .btn-ab .circle:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cc4460, inset 0 2px 8px rgba(0,0,0,0.4);
        }
        .btn-ab .label {
            color: #8a7a9a;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn-b .circle { background: #5a9aff; box-shadow: 0 4px 0 #4477cc, 0 6px 12px rgba(0,0,0,0.4), inset 0 -4px 8px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.3); }
        .btn-b .circle:active { box-shadow: 0 0 0 #4477cc, inset 0 2px 8px rgba(0,0,0,0.4); }

        /* 底部功能区 */
        .bottom-controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
        }
        .btn-pill {
            width: 64px; height: 16px;
            background: #3a3544;
            border-radius: 8px;
            box-shadow:
                    0 3px 0 #221f29,
                    inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.05s;
        }
        .btn-pill:active { transform: translateY(3px); box-shadow: 0 0 0 #221f29; }
        .bottom-labels {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 6px;
            color: #6a5a7a;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 扬声器 */
        .speaker {
            position: absolute;
            bottom: 32px; right: 24px;
            display: flex;
            gap: 3px;
            transform: rotate(-30deg);
            opacity: 0.4;
        }
        .speaker-line {
            width: 3px; height: 24px;
            background: #1a1520;
            border-radius: 2px;
        }

        /* 装饰螺丝 */
        .screw {
            position: absolute;
            width: 8px; height: 8px;
            background: #1a1520;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }
        .screw-tl { top: 12px; left: 12px; }
        .screw-tr { top: 12px; right: 12px; }
        .screw-bl { bottom: 12px; left: 12px; }
        .screw-br { bottom: 12px; right: 12px; }

        /* 响应式微调 */
        @media (max-height: 700px) {
            .pocket-shell { padding: 16px 16px 24px; }
            .dpad { transform: scale(0.85); }
            .action-buttons { transform: rotate(-15deg) scale(0.9); }
        }
    </style>
</head>
<body>

<div class="pocket-shell">
    <!-- 螺丝 -->
    <div class="screw screw-tl"></div>
    <div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div>
    <div class="screw screw-br"></div>

    <!-- 顶部像素条 -->
    <div class="shell-top">
        <div class="pixel-dot"></div>
        <div class="pixel-dot"></div>
        <div class="pixel-dot"></div>
        <div class="pixel-dot"></div>
        <div class="pixel-dot"></div>
    </div>

    <!-- 品牌 -->
    <div class="shell-brand">SHAPE-SNAKE SYSTEM</div>

    <!-- 屏幕区 -->
    <div class="screen-bezel">
        <div class="screen-label">
            <span>DOT MATRIX WITH STEREO SOUND</span>
            <div class="battery-led"></div>
        </div>
        <!-- 你的游戏 Canvas 直接替换这个 canvas -->
        <canvas id="gameScreen"></canvas>
    </div>

    <!-- 控制区 -->
    <div class="controls-area">
        <!-- 方向键 -->
        <div class="dpad">
            <div class="dpad-up" onclick="setDir('UP')"></div>
            <div class="dpad-left" onclick="setDir('LEFT')"></div>
            <div class="dpad-center"></div>
            <div class="dpad-right" onclick="setDir('RIGHT')"></div>
            <div class="dpad-down" onclick="setDir('DOWN')"></div>
        </div>

        <!-- AB键 -->
        <div class="action-buttons">
            <div class="btn-ab btn-b">
                <div class="circle" onclick="doSpit()"></div>
                <div class="label">B</div>
            </div>
            <div class="btn-ab">
                <div class="circle" onclick="doSpit()"></div>
                <div class="label">A</div>
            </div>
        </div>
    </div>

    <!-- Select / Start -->
    <div class="bottom-controls">
        <div class="btn-pill" onclick="resetGame()"></div>
        <div class="btn-pill" onclick="resetGame()"></div>
    </div>
    <div class="bottom-labels">
        <span>SELECT</span>
        <span>START</span>
    </div>

    <!-- 扬声器 -->
    <div class="speaker">
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
    </div>
</div>

<script>
    /* ===== 以下是你现有的游戏逻辑，完全不变 ===== */
    const canvas = document.getElementById('gameScreen');
    const ctx = canvas.getContext('2d');
    let W, H, CS;

    // 简化的演示蛇（实际替换为你的完整游戏）
    let snake = [{x:2,y:4},{x:1,y:4},{x:0,y:4}];
    let dir = 'RIGHT', nextDir = 'RIGHT';
    let particles = [];

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        W = rect.width - 32; // 减去padding
        canvas.width = W;
        canvas.height = W;
        CS = W / 10;
    }
    window.addEventListener('resize', resize);
    resize();

    function setDir(d) {
        const opp = {UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
        if (opp[d] !== dir) nextDir = d;
    }

    function doSpit() {
        // 你的吐块逻辑
        addParticles(5, 5, '#ff0055', 10);
    }

    function resetGame() {
        snake = [{x:2,y:4},{x:1,y:4},{x:0,y:4}];
        dir = 'RIGHT'; nextDir = 'RIGHT';
    }

    function addParticles(gx, gy, col, n) {
        for (let i=0;i<n;i++) particles.push({
            x: (gx+0.5)*CS, y: (gy+0.5)*CS,
            vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8-3,
            life: 1, color: col, size: Math.random()*3+2
        });
    }

    function update() {
        dir = nextDir;
        const head = snake[0];
        let nx = head.x, ny = head.y;
        if (dir==='UP') ny--; else if (dir==='DOWN') ny++; else if (dir==='LEFT') nx--; else nx++;
        if (nx<0) nx=9; if (nx>9) nx=0; if (ny<0) ny=9; if (ny>9) ny=0;
        snake.unshift({x:nx,y:ny});
        snake.pop();
    }

    function draw() {
        ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,W,W);

        // 网格
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        for (let i=0;i<=10;i++) {
            ctx.beginPath(); ctx.moveTo(i*CS,0); ctx.lineTo(i*CS,W); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CS); ctx.lineTo(W,i*CS); ctx.stroke();
        }

        // 目标（演示用十字）
        ctx.strokeStyle = 'rgba(255,0,85,0.3)';
        ctx.setLineDash([4,4]);
        ctx.strokeRect(4*CS+2, 3*CS+2, 2*CS-4, 4*CS-4);
        ctx.setLineDash([]);

        // 蛇
        for (let i=snake.length-1;i>=0;i--) {
            const s = snake[i];
            const light = 55 - (i/Math.max(snake.length,1))*30;
            ctx.fillStyle = `hsl(0, 100%, ${light}%)`;
            roundRect(ctx, s.x*CS+1, s.y*CS+1, CS-2, CS-2, 4);
            ctx.fill();
        }

        // 眼睛
        const hd = snake[0];
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc((hd.x+0.7)*CS, (hd.y+0.35)*CS, CS*0.12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((hd.x+0.7)*CS, (hd.y+0.65)*CS, CS*0.12, 0, Math.PI*2); ctx.fill();

        // 粒子
        for (let i=particles.length-1;i>=0;i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
            if (p.life <= 0) { particles.splice(i,1); continue; }
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
        c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
        c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
        c.closePath();
    }

    // 输入
    document.addEventListener('keydown', e => {
        if (e.key==='ArrowUp') setDir('UP');
        if (e.key==='ArrowDown') setDir('DOWN');
        if (e.key==='ArrowLeft') setDir('LEFT');
        if (e.key==='ArrowRight') setDir('RIGHT');
        if (e.key===' '||e.key==='Enter') doSpit();
    });

    let sx, sy;
    canvas.addEventListener('touchstart', e => {
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    }, {passive:false});
    canvas.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - sx;
        const dy = e.changedTouches[0].clientY - sy;
        if (Math.abs(dx)<30 && Math.abs(dy)<30) return;
        setDir(Math.abs(dx)>Math.abs(dy) ? (dx>0?'RIGHT':'LEFT') : (dy>0?'DOWN':'UP'));
    }, {passive:false});

    setInterval(update, 200);
    function loop() { draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
