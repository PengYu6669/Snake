<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>濒死滤镜 + 心跳音效 Demo</title>
<style>
body {
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  gap: 20px;
  font-family: -apple-system, sans-serif;
}
#cvs {
  width: 360px;
  height: 360px;
  background: #0d0d0d;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  transition: transform 0.05s;
}
.btns {
  display: flex;
  gap: 12px;
}
button {
  padding: 12px 28px;
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
.btn-trigger {
  background: linear-gradient(135deg, #ff0055, #ff5500);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,0,85,0.4);
}
.btn-stop {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
.hint {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
}
</style>
</head>
<body>

<canvas id="cvs"></canvas>
<div class="btns">
  <button class="btn-trigger" onclick="startNearDeath()">🔥 触发濒死（最后10步）</button>
  <button class="btn-stop" onclick="stopNearDeath()">停止</button>
</div>
<div class="hint">点击触发后，观察屏幕变红、目标格呼吸、心跳声</div>

<script>
const canvas = document.getElementById('cvs');
const ctx = canvas.getContext('2d');
const W = 360, H = 360;
canvas.width = W; canvas.height = H;

let isNearDeath = false;
let nearDeathStartTime = 0;
let heartbeatTimer = null;
let audioCtx = null;

// 模拟游戏状态
const CS = W / 14;
const snake = [{x:4,y:7},{x:5,y:7},{x:6,y:7},{x:7,y:7},{x:8,y:7}];
const filledTargets = new Set(['6,5','7,5','8,5','6,6','7,6','8,6','6,7','7,7','8,7','6,8','7,8','8,8']);
const allTargets = [];
for(let r=3;r<=9;r++)for(let c=3;c<=10;c++)allTargets.push([c,r]);

function isCellFilled(x,y){
  return filledTargets.has(`${x},${y}`);
}

/* ================= 音效系统 ================= */
function getAudioCtx(){
  if(!audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) audioCtx = new Ctx();
  }
  if(audioCtx && audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
  return audioCtx;
}

function playHeartbeat(){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const t = ctx.currentTime;

  // 压缩器
  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.setValueAtTime(-24, t);
  compressor.knee.setValueAtTime(30, t);
  compressor.ratio.setValueAtTime(12, t);
  compressor.attack.setValueAtTime(0.003, t);
  compressor.release.setValueAtTime(0.25, t);
  compressor.connect(ctx.destination);

  // 咚（重）
  const osc1 = ctx.createOscillator();
  const g1 = ctx.createGain();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(55, t);
  osc1.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  g1.gain.setValueAtTime(0, t);
  g1.gain.linearRampToValueAtTime(0.9, t + 0.02);
  g1.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
  osc1.connect(g1); g1.connect(compressor);
  osc1.start(t); osc1.stop(t + 0.25);

  // 哒（轻）
  const osc2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(65, t + 0.28);
  osc2.frequency.exponentialRampToValueAtTime(45, t + 0.35);
  g2.gain.setValueAtTime(0, t + 0.28);
  g2.gain.linearRampToValueAtTime(0.5, t + 0.30);
  g2.gain.exponentialRampToValueAtTime(0.01, t + 0.45);
  osc2.connect(g2); g2.connect(compressor);
  osc2.start(t + 0.28); osc2.stop(t + 0.45);

  // 噪声层（厚重感）
  const bufferSize = ctx.sampleRate * 0.3;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1)*0.5;
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const g3 = ctx.createGain();
  g3.gain.setValueAtTime(0, t);
  g3.gain.linearRampToValueAtTime(0.35, t + 0.02);
  g3.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
  noise.connect(g3); g3.connect(compressor);
  noise.start(t); noise.stop(t + 0.3);
}

/* ================= 绘制 ================= */
function drawGame(){
  ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,W,H);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for(let i=0;i<=14;i++){
    ctx.beginPath(); ctx.moveTo(i*CS,0); ctx.lineTo(i*CS,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CS); ctx.lineTo(W,i*CS); ctx.stroke();
  }

  // 目标格
  for(const [tx,ty] of allTargets){
    if(isCellFilled(tx,ty)){
      ctx.fillStyle = 'rgba(0,255,136,0.15)';
      ctx.fillRect(tx*CS,ty*CS,CS,CS);
      ctx.fillStyle = '#00ff88'; ctx.font = `bold ${CS*0.5}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✓', (tx+0.5)*CS, (ty+0.5)*CS);
    } else {
      ctx.strokeStyle = 'rgba(0,255,136,0.15)';
      ctx.setLineDash([3,3]); ctx.lineWidth = 1;
      ctx.strokeRect(tx*CS+2,ty*CS+2,CS-4,CS-4);
      ctx.setLineDash([]);
    }
  }

  // 蛇身
  for(let i=snake.length-1;i>=0;i--){
    const s = snake[i];
    const light = 55 - (i/Math.max(snake.length,1))*30;
    ctx.fillStyle = `hsl(0, 100%, ${light}%)`;
    roundRect(ctx, s.x*CS+1.5, s.y*CS+1.5, CS-3, CS-3, 4);
    ctx.fill();
  }
  // 眼睛
  const h = snake[0];
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.35)*CS,CS*0.12,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.65)*CS,CS*0.12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.35)*CS,CS*0.06,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.65)*CS,CS*0.06,0,Math.PI*2); ctx.fill();
}

function drawNearDeathFilter(){
  if(!isNearDeath) return;
  const now = Date.now();
  const t = now - nearDeathStartTime;

  // 1. 偏红暗层（更压抑的去饱和）
  ctx.fillStyle = 'rgba(20, 0, 0, 0.6)';
  ctx.fillRect(0, 0, W, H);

  // 2. 未填充目标格：实心血红 + 白色描边 + 强外发光
  const pulse = (Math.sin(now / 200) + 1) / 2;
  for(const [tx,ty] of allTargets){
    if(!isCellFilled(tx,ty)){
      // 实心填充
      ctx.fillStyle = `rgba(255, 0, 68, ${0.7 + pulse * 0.3})`;
      ctx.fillRect(tx*CS + 1, ty*CS + 1, CS - 2, CS - 2);

      // 白色内描边
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(tx*CS + 3, ty*CS + 3, CS - 6, CS - 6);

      // 强外发光
      ctx.shadowColor = '#ff0044';
      ctx.shadowBlur = 20 + pulse * 25;
      ctx.strokeRect(tx*CS + 3, ty*CS + 3, CS - 6, CS - 6);
      ctx.shadowBlur = 0;
    }
  }

  // 3. 屏幕边缘：径向渐变内发光（像血渗入）
  const edgeAlpha = 0.4 + pulse * 0.4;
  const rg = ctx.createRadialGradient(W/2, H/2, W*0.35, W/2, H/2, W*0.85);
  rg.addColorStop(0, 'transparent');
  rg.addColorStop(1, `rgba(255, 0, 68, ${edgeAlpha})`);
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);

  // 4. 粗红边框脉动
  ctx.strokeStyle = `rgba(255, 0, 68, ${0.6 + pulse * 0.4})`;
  ctx.lineWidth = 10 + pulse * 10; // 10~20px
  ctx.strokeRect(6, 6, W-12, H-12);

  // 5. 全局闪红（300ms周期，更明显）
  if(Math.floor(now / 300) % 2 === 0){
    ctx.fillStyle = 'rgba(255, 0, 68, 0.2)';
    ctx.fillRect(0, 0, W, H);
  }

  // 6. 屏幕微震动（通过CSS transform）
  const shake = pulse * 4;
  canvas.style.transform = `translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)`;
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

/* ================= 控制 ================= */
function startNearDeath(){
  if(isNearDeath) return;
  isNearDeath = true;
  nearDeathStartTime = Date.now();

  // 解锁音频并播放心跳
  getAudioCtx();
  playHeartbeat();
  heartbeatTimer = setInterval(() => {
    playHeartbeat();
  }, 500); // 120bpm
}

function stopNearDeath(){
  isNearDeath = false;
  if(heartbeatTimer){
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
  }
  canvas.style.transform = '';
}

/* ================= 循环 ================= */
function loop(){
  drawGame();
  drawNearDeathFilter();
  requestAnimationFrame(loop);
}

// 启动
loop();
</script>
</body>
</html>
