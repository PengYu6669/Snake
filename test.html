<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教程演示 - 交互式</title>
    <style>
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
        }
        .wrap {
            width: 360px;
            background: #2a2332;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        #cvs {
            width: 100%;
            aspect-ratio: 1;
            background: #0d0d0d;
            border-radius: 8px;
            display: block;
            touch-action: none;
        }
        .hint {
            text-align: center;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            margin-top: 14px;
            min-height: 28px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hint.show { opacity: 1; }
        .finger { display: inline-block; animation: tap 0.8s infinite; }
        @keyframes tap { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    </style>
</head>
<body>

<div class="wrap">
    <canvas id="cvs"></canvas>
    <div class="hint" id="hint"></div>
</div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const hintEl = document.getElementById('hint');

    let W, CS;
    let snake = [], spit = [], parts = [];
    let step = 0;        // 当前教学步骤
    let subStep = 0;     // 步骤内的小进度
    let waiting = false; // 是否等待用户输入
    let frame = 0;

    // 十字目标格
    const TARGET = [{x:1,y:2},{x:2,y:2},{x:3,y:2},{x:2,y:1},{x:2,y:3}];

    // 教学剧本：每步定义蛇该怎么走、在哪停、提示什么
    const SCRIPT = [
        // 0: 自动向右，覆盖横排
        { moves: [[1,2],[2,2],[3,2]], msg: '蛇身经过自动填充 ✓', wait: false, pause: 50 },
        // 1: 向上走到上臂旁边，停下等用户吐块
        { moves: [[3,1]], msg: null, wait: false, pause: 0 },
        // 2: 教学点：双击吐块（上臂）
        { moves: [], msg: '👆 双击屏幕吐方块', wait: true, spitAt: {x:2,y:1} },
        // 3: 向下走到下臂旁边
        { moves: [[3,2],[3,3],[2,3]], msg: null, wait: false, pause: 0 },
        // 4: 教学点：双击吐块（下臂）
        { moves: [], msg: '👆 双击屏幕吐方块', wait: true, spitAt: {x:2,y:3} },
        // 5: 向左走到中间，展示蛇身填满
        { moves: [[2,2],[1,2]], msg: '💡 蛇身也是方块！', wait: false, pause: 60 },
        // 6: 通关
        { moves: [], msg: '🎉 填满目标区域通关！', wait: false, pause: 9999 }
    ];

    function resize() {
        W = cvs.parentElement.clientWidth - 32;
        cvs.width = W; cvs.height = W;
        CS = W / 5;
    }
    window.addEventListener('resize', resize);
    resize();

    function setHint(txt) {
        hintEl.innerHTML = txt || '';
        hintEl.classList.toggle('show', !!txt);
    }

    function addP(gx, gy, col, n) {
        for(let i=0;i<n;i++) parts.push({
            x:(gx+0.5)*CS, y:(gy+0.5)*CS,
            vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8-3,
            life:1, color:col, size:Math.random()*3+2
        });
    }

    function reset() {
        step = 0; subStep = 0; waiting = false; frame = 0;
        snake = [{x:0,y:2},{x:0,y:2},{x:0,y:2}];
        spit = []; parts = [];
        setHint(null);
    }

    /* -------- 核心：每帧检查剧本 -------- */
    function tick() {
        frame++;
        const s = SCRIPT[step];
        if (!s) return;

        // 如果正在等待用户输入，什么都不做（蛇停住）
        if (waiting) return;

        // 如果有移动指令，逐格执行
        if (subStep < s.moves.length) {
            // 每 25 帧走一格（比原来慢，看得清）
            if (frame % 25 === 0) {
                const target = s.moves[subStep];
                snake.unshift({x:target[0], y:target[1]});
                if (snake.length > 3) snake.pop(); // 保持长度3（演示用）
                subStep++;
            }
        } else {
            // 这步的移动走完了
            if (s.msg && !waiting) {
                setHint(s.msg);
            }

            // 如果需要暂停（非等待用户，只是让观众看清）
            if (!s.wait && s.pause && s.pause > 0) {
                s.pause--;
                return;
            }

            // 如果需要等待用户输入
            if (s.wait) {
                waiting = true;
                setHint(s.msg);
                return; // 停住，等用户双击
            }

            // 否则进入下一步
            nextStep();
        }
    }

    function nextStep() {
        step++;
        subStep = 0;
        frame = 0;
        setHint(null);

        // 最后一步通关粒子
        if (step === 6) {
            for(let i=0;i<40;i++) parts.push({
                x:2.5*CS, y:2.5*CS,
                vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12-4,
                life:1.5, color:Math.random()>0.5?'#ffd700':'#ff0055', size:Math.random()*5+2
            });
        }
    }

    /* -------- 用户输入：双击/点击触发 -------- */
    function onUserAction() {
        if (!waiting) return;

        const s = SCRIPT[step];

        // 执行"吐块"教学效果
        if (s.spitAt) {
            // 在目标位置生成绿色方块（教学演示，不严格遵循物理）
            spit.push({x:s.spitAt.x, y:s.spitAt.y});
            addP(s.spitAt.x, s.spitAt.y, '#00ff88', 12);

            // 蛇缩短一节（视觉上）
            if (snake.length > 1) snake.pop();
        }

        waiting = false;
        setHint(null);

        // 给一点停顿让用户看清效果，再进入下一步
        setTimeout(nextStep, 400);
    }

    // 绑定双击和点击
    cvs.addEventListener('dblclick', onUserAction);
    cvs.addEventListener('click', onUserAction);
    cvs.addEventListener('touchend', e => {
        // 移动端把 touchend 当作点击触发
        onUserAction();
    }, {passive:false});

    /* -------- 绘制 -------- */
    function draw() {
        ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,W,W);

        // 网格
        ctx.strokeStyle='rgba(255,255,255,0.04)';
        for(let i=0;i<=5;i++){
            ctx.beginPath(); ctx.moveTo(i*CS,0); ctx.lineTo(i*CS,W); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CS); ctx.lineTo(W,i*CS); ctx.stroke();
        }

        // 十字目标（青色虚线脉动）
        const pulse=(Math.sin(frame*0.05)+1)/2;
        for(const t of TARGET){
            ctx.fillStyle=`rgba(0,255,136,${0.05+pulse*0.04})`;
            ctx.fillRect(t.x*CS, t.y*CS, CS, CS);
            ctx.strokeStyle=`rgba(0,255,136,${0.2+pulse*0.15})`;
            ctx.setLineDash([4,4]); ctx.lineWidth=2;
            ctx.strokeRect(t.x*CS+2, t.y*CS+2, CS-4, CS-4);
            ctx.setLineDash([]);
        }

        // 已吐出的绿色方块 + ✓
        for(const b of spit){
            ctx.fillStyle='#00ff88';
            ctx.shadowColor='#00ff88'; ctx.shadowBlur=12;
            ctx.fillRect(b.x*CS+3, b.y*CS+3, CS-6, CS-6);
            ctx.shadowBlur=0;
            ctx.fillStyle='#0d0d0d'; ctx.font=`bold ${CS*0.5}px sans-serif`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('✓', (b.x+0.5)*CS, (b.y+0.5)*CS);
        }

        // 蛇身（红色渐变）
        for(let i=snake.length-1;i>=0;i--){
            const s=snake[i], light=55-(i/Math.max(snake.length,1))*30;
            ctx.fillStyle=`hsl(0,100%,${light}%)`;
            roundRect(ctx, s.x*CS+1.5, s.y*CS+1.5, CS-3, CS-3, 4);
            ctx.fill();
        }

        // 蛇头眼睛
        if(snake.length){
            const h=snake[0];
            ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.35)*CS,CS*0.12,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.65)*CS,CS*0.12,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#000';
            ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.35)*CS,CS*0.06,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc((h.x+0.65)*CS,(h.y+0.65)*CS,CS*0.06,0,Math.PI*2); ctx.fill();
        }

        // 粒子
        for(let i=parts.length-1;i>=0;i--){
            const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.02;
            if(p.life<=0){parts.splice(i,1);continue;}
            ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha=1;
    }

    function roundRect(c,x,y,w,h,r){
        c.beginPath();
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
        c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
        c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
        c.closePath();
    }

    function loop(){ tick(); draw(); requestAnimationFrame(loop); }
    reset();
    loop();
</script>
</body>
</html>
